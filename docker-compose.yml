x-train-base: &train-base
  build:
    context: .
    args:
      APP_UID: ${APP_UID:-1000}
  devices:
    - nvidia.com/gpu=all
  volumes:
    - ${REPOS_DIR:-./repos}:/data/commits
    - ${CACHE_DIR:-./cache}:/data/cache
    - ${OUTPUT_DIR:-./output}:/data/output
    - ./datasets:/data/datasets
  environment:
    - PYTHONUNBUFFERED=1
    - WANDB_MODE=${WANDB_MODE:-disabled}
    - WANDB_API_KEY=${WANDB_API_KEY:-}

services:
  # Step 1: Clone all repos referenced in the CSV dataset
  prep:
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1000}
    volumes:
      - ${REPOS_DIR:-./repos}:/data/commits
      - ./datasets:/data/datasets
    command: >
      python scripts/clone_repos.py
        --csv /data/datasets/${DATASET}-train.csv
        --csv /data/datasets/${DATASET}-val.csv
        --csv /data/datasets/${DATASET}-test.csv
        --output_dir /data/commits
        --workers 16

  # Step 2a: Train the Code model
  train-code:
    <<: *train-base
    depends_on:
      prep:
        condition: service_completed_successfully
    command: >
      python main.py
        --source_model Code
        --csv_train /data/datasets/${DATASET}-train.csv
        --csv_val /data/datasets/${DATASET}-val.csv
        --csv_test /data/datasets/${DATASET}-test.csv
        --commit_repos_path /data/commits
        --cache_dir /data/cache
        --output_dir /data/output
        --epochs 100
        --batch_size 16
        --learning_rate 1e-5
        --dropout 0.5
        --code_embedding_type simple
        --recreate_cache

  # Step 2b: Train the Message model (can run in parallel with train-code)
  train-message:
    <<: *train-base
    depends_on:
      prep:
        condition: service_completed_successfully
    command: >
      python main.py
        --source_model Message
        --csv_train /data/datasets/${DATASET}-train.csv
        --csv_val /data/datasets/${DATASET}-val.csv
        --csv_test /data/datasets/${DATASET}-test.csv
        --commit_repos_path /data/commits
        --cache_dir /data/cache
        --output_dir /data/output
        --epochs 100
        --batch_size 16
        --learning_rate 1e-5
        --dropout 0.5
        --recreate_cache

  # Step 3: Train the Multi model (after sub-models are done)
  train-multi:
    <<: *train-base
    depends_on:
      train-code:
        condition: service_completed_successfully
      train-message:
        condition: service_completed_successfully
    command: >
      python main.py
        --source_model Multi_Without_Behavioural
        --csv_train /data/datasets/${DATASET}-train.csv
        --csv_val /data/datasets/${DATASET}-val.csv
        --csv_test /data/datasets/${DATASET}-test.csv
        --commit_repos_path /data/commits
        --cache_dir /data/cache
        --output_dir /data/output
        --code_merge_file
        --epochs 100
        --batch_size 16
        --learning_rate 1e-5
        --dropout 0.5
        --recreate_cache
